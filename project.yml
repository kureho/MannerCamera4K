name: MannerCamera4K
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

targets:
  MannerCamera4K:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MannerCamera4K
        excludes:
          - "**/.gitkeep"
    info:
      path: MannerCamera4K/Info.plist
      properties:
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "写真・動画の撮影に使用します"
        NSMicrophoneUsageDescription: "動画撮影時の音声録音に使用します"
        NSPhotoLibraryAddUsageDescription: "撮影した写真・動画の保存に使用します"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MannerCamera4K
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: MannerCamera4K/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0

  MannerCamera4KTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: MannerCamera4KTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MannerCamera4KTests
        SWIFT_VERSION: "5.9"
    dependencies:
      - target: MannerCamera4K
